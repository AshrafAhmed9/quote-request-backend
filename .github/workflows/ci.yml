name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate dev --name ci
        env:
          DATABASE_URL: "file:./test.db"
      - run: npm run typecheck
      - run: npm test
        env:
          DATABASE_URL: "file:./test.db"
          NODE_ENV: test
          FASTAPI_MOCK_ENABLED: "true"
